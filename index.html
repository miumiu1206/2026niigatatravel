<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🌸 Japan Trip 2026</title>

<style>

body{
margin:0;
font-family:-apple-system;
background:#ffd6e7;
color:#333;
}

header{
text-align:center;
padding:20px;
background:#ffc3d9;
font-size:20px;
font-weight:bold;
}

.container{
padding:15px;
}

select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-bottom:15px;
font-size:16px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.title{
font-weight:bold;
margin-bottom:8px;
}

button{
background:#ff7aa8;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
font-size:14px;
}

input{
width:70%;
padding:8px;
border-radius:8px;
border:1px solid #ddd;
}

.spot{
display:flex;
justify-content:space-between;
margin-top:8px;
}

.map{
margin-top:8px;
display:inline-block;
}

</style>
</head>

<body>

<header>
🌸 Japan Trip 2026
</header>

<div class="container">

<select id="daySelect"></select>

<div class="card">
<div class="title">📍 Location</div>
<div id="location"></div>
<a id="mapBtn" target="_blank">
<button class="map">🗺 Map</button>
</a>
</div>

<div class="card">
<div class="title">🏨 Hotel</div>
<div id="hotel"></div>
</div>

<div class="card">
<div class="title">🌤 Weather</div>
<div id="weather">Loading...</div>
</div>

<div class="card">
<div class="title">📍 景點</div>

<input id="spotInput" placeholder="新增景點">
<button onclick="addSpot()">加入</button>

<div id="spotList"></div>

</div>

<div class="card">
<div class="title">📝 Remark</div>
<div id="remark"></div>
</div>

</div>

<script>

const data={

"2026-03-07":{
location:"東京(品川)",
hotel:"品川 Prince Hotel",
remark:"抵達東京"
},

"2026-03-08":{
location:"東京",
hotel:"品川 Prince Hotel"
},

"2026-03-09":{
location:"東京",
hotel:"品川 Prince Hotel"
},

"2026-03-10":{
location:"東京",
hotel:"品川 Prince Hotel"
},

"2026-03-11":{
location:"Niigata",
hotel:"新潟日航酒店"
},

"2026-03-12":{
location:"Niigata",
hotel:"新潟日航酒店"
},

"2026-03-13":{
location:"輕井澤",
hotel:"輕井澤 Prince"
},

"2026-03-14":{
location:"輕井澤",
hotel:"輕井澤 Prince"
},

"2026-03-15":{
location:"月岡溫泉",
hotel:"白玉之湯"
},

"2026-03-16":{
location:"月岡溫泉",
hotel:"白玉之湯"
},

"2026-03-17":{
location:"月岡溫泉",
hotel:"白玉之湯"
},

"2026-03-18":{
location:"Niigata",
hotel:"新潟日航酒店"
},

"2026-03-19":{
location:"Niigata",
hotel:"新潟日航酒店"
},

"2026-03-20":{
location:"Niigata",
hotel:"新潟日航酒店"
},

"2026-03-21":{
location:"Niigata",
hotel:"新潟日航酒店"
},

"2026-03-22":{
location:"東京",
hotel:"東京酒店"
},

"2026-03-23":{
location:"東京",
hotel:"東京酒店"
},

"2026-03-24":{
location:"東京站",
hotel:"回程"
}

}

const select=document.getElementById("daySelect")

Object.keys(data).forEach((d,i)=>{

let op=document.createElement("option")
op.value=d
op.text=d
select.appendChild(op)

})

select.onchange=loadDay

function loadDay(){

let day=select.value
let d=data[day]

document.getElementById("location").innerText=d.location||""
document.getElementById("hotel").innerText=d.hotel||""
document.getElementById("remark").innerText=d.remark||""

document.getElementById("mapBtn").href=
"https://www.google.com/maps/search/"+d.location

loadSpots()

weather()

}

function addSpot(){

let day=select.value
let v=document.getElementById("spotInput").value

if(!v)return

let spots=JSON.parse(localStorage.getItem(day)||"[]")

spots.push(v)

localStorage.setItem(day,JSON.stringify(spots))

document.getElementById("spotInput").value=""

loadSpots()

}

function loadSpots(){

let day=select.value
let spots=JSON.parse(localStorage.getItem(day)||"[]")

let div=document.getElementById("spotList")

div.innerHTML=""

spots.forEach((s,i)=>{

let d=document.createElement("div")
d.className="spot"

d.innerHTML=
s+
' <button onclick="delSpot('+i+')">❌</button>'

div.appendChild(d)

})

}

function delSpot(i){

let day=select.value
let spots=JSON.parse(localStorage.getItem(day)||"[]")

spots.splice(i,1)

localStorage.setItem(day,JSON.stringify(spots))

loadSpots()

}

function weather(){

let w=["☀️ Sunny","⛅ Cloudy","🌧 Rain"]

document.getElementById("weather").innerText=
w[Math.floor(Math.random()*3)]

}

loadDay()

</script>

</body>
</html>

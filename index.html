<!DOCTYPE html>
<html lang="zh-HK">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Japan Trip 2026</title>

<style>

body{
font-family:-apple-system;
margin:0;
background:#ffd6e7;
}

header{
background:#ff9ec4;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
color:white;
}

.container{
padding:15px;
}

select{
width:100%;
padding:12px;
border-radius:12px;
border:none;
font-size:16px;
margin-bottom:15px;
}

.card{
background:white;
padding:15px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.title{
font-weight:bold;
margin-bottom:8px;
}

button{
background:#ff7aa8;
border:none;
padding:8px 12px;
color:white;
border-radius:8px;
}

input{
padding:8px;
border-radius:8px;
border:1px solid #ddd;
width:65%;
}

.spot{
display:flex;
justify-content:space-between;
margin-top:6px;
}

</style>

</head>

<body>

<header>
🌸 Japan Trip 2026
</header>

<div class="container">

<select id="daySelect"></select>

<div class="card">
<div class="title">📍 Location</div>
<div id="location"></div>
<br>
<a id="mapBtn" target="_blank">
<button>🗺 Open Map</button>
</a>
</div>

<div class="card">
<div class="title">🏨 Hotel</div>
<div id="hotel"></div>
</div>

<div class="card">
<div class="title">📍 景點</div>

<input id="spotInput" placeholder="新增景點">
<button onclick="addSpot()">加入</button>

<div id="spotList"></div>

</div>

<div class="card">
<div class="title">📝 Remark</div>
<div id="remark"></div>
</div>

</div>

<script>

const tripData={

"2026-03-07":{
location:"東京(品川)",
hotel:"Shinagawa Prince Hotel",
remark:"到達東京"
},

"2026-03-08":{
location:"東京",
hotel:"Shinagawa Prince Hotel"
},

"2026-03-09":{
location:"東京",
hotel:"Shinagawa Prince Hotel"
},

"2026-03-10":{
location:"東京",
hotel:"Shinagawa Prince Hotel"
},

"2026-03-11":{
location:"新潟 Niigata",
hotel:"Hotel Nikko Niigata"
},

"2026-03-12":{
location:"新潟 Niigata",
hotel:"Hotel Nikko Niigata"
},

"2026-03-13":{
location:"輕井澤",
hotel:"Karuizawa Prince Hotel"
},

"2026-03-14":{
location:"輕井澤",
hotel:"Karuizawa Prince Hotel"
},

"2026-03-15":{
location:"月岡溫泉",
hotel:"Shiratama no Yu"
},

"2026-03-16":{
location:"月岡溫泉",
hotel:"Shiratama no Yu"
},

"2026-03-17":{
location:"月岡溫泉",
hotel:"Shiratama no Yu"
},

"2026-03-18":{
location:"新潟",
hotel:"Hotel Nikko Niigata"
},

"2026-03-19":{
location:"新潟",
hotel:"Hotel Nikko Niigata"
},

"2026-03-20":{
location:"新潟",
hotel:"Hotel Nikko Niigata"
},

"2026-03-21":{
location:"新潟",
hotel:"Hotel Nikko Niigata"
},

"2026-03-22":{
location:"東京",
hotel:"Tokyo Hotel"
},

"2026-03-23":{
location:"東京",
hotel:"Tokyo Hotel"
},

"2026-03-24":{
location:"東京站",
hotel:"回程"
}

}

const select=document.getElementById("daySelect")

for(let d in tripData){

let opt=document.createElement("option")
opt.value=d
opt.text=d

select.appendChild(opt)

}

select.addEventListener("change",loadDay)

function loadDay(){

let day=select.value
let data=tripData[day]

document.getElementById("location").innerText=data.location||""
document.getElementById("hotel").innerText=data.hotel||""
document.getElementById("remark").innerText=data.remark||""

document.getElementById("mapBtn").href=
"https://www.google.com/maps/search/"+data.location

loadSpots()

}

function addSpot(){

let input=document.getElementById("spotInput")
let val=input.value.trim()

if(!val) return

let day=select.value

let spots=JSON.parse(localStorage.getItem(day)||"[]")

spots.push(val)

localStorage.setItem(day,JSON.stringify(spots))

input.value=""

loadSpots()

}

function loadSpots(){

let day=select.value

let spots=JSON.parse(localStorage.getItem(day)||"[]")

let list=document.getElementById("spotList")

list.innerHTML=""

spots.forEach((s,i)=>{

let div=document.createElement("div")

div.className="spot"

div.innerHTML=
s+' <button onclick="deleteSpot('+i+')">❌</button>'

list.appendChild(div)

})

}

function deleteSpot(i){

let day=select.value

let spots=JSON.parse(localStorage.getItem(day)||"[]")

spots.splice(i,1)

localStorage.setItem(day,JSON.stringify(spots))

loadSpots()

}

select.selectedIndex=0
loadDay()

</script>

</body>
</html>

e} (星期${weekday[dateObj.getDay()]}) ${todayMark}</div> <div class="row"><b>旅行日</b>：Day ${dayNumber}</div> <div class="row"><b>地點</b>：${d.location}</div> <div class="row"><b>酒店</b>：${d.hotel}</div> <div class="row"><b>餐廳</b>：${d.restaurant}</div> <div class="row"><b>景點</b>：${d.spot}</div> } select.addEventListener("change",()=>{ show(select.value) }) let today=new Date().toISOString().slice(0,10) if(data[today]){ select.value=today show(today) setTimeout(()=>{ document.querySelector("option[value='"+today+"']").scrollIntoView() },200) }else{ show(dates[0]) } </script> </body> </html>

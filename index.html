<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Japan Trip Planner</title>

<style>

body{
font-family:-apple-system;
background:#ffd6e7;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#d63384;
}

.card{
background:white;
border-radius:15px;
padding:15px;
margin-bottom:20px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#ffc2d1;
padding:8px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

td[contenteditable]{
background:#fff7fb;
}

button{
background:#ff8fab;
border:none;
padding:6px 10px;
border-radius:8px;
color:white;
font-size:12px;
}

button:hover{
background:#fb6f92;
}

.add{
margin-top:10px;
}

</style>

</head>

<body>

<h1>🌸 Japan Trip Planner</h1>

<div class="card">

<h3>Day 1</h3>
<p><b>Location:</b> Tokyo</p>
<p><b>Hotel:</b> Hotel Sunroute Plaza Shinjuku</p>

<table id="table1">
<tr>
<th>Time</th>
<th>Activity</th>
<th>食店</th>
<th>Remarks</th>
<th>Map</th>
<th></th>
</tr>

<tr>
<td contenteditable>09:00</td>
<td contenteditable>Shinjuku</td>
<td contenteditable></td>
<td contenteditable></td>
<td><button onclick="map(this)">Map</button></td>
<td><button onclick="del(this)">X</button></td>
</tr>

</table>

<button class="add" onclick="addRow('table1')">+ Add</button>

</div>

<div class="card">

<h3>Day 2</h3>
<p><b>Location:</b> Tokyo</p>
<p><b>Hotel:</b> Hotel Sunroute Plaza Shinjuku</p>

<table id="table2">
<tr>
<th>Time</th>
<th>Activity</th>
<th>食店</th>
<th>Remarks</th>
<th>Map</th>
<th></th>
</tr>

<tr>
<td contenteditable>10:00</td>
<td contenteditable>Asakusa</td>
<td contenteditable></td>
<td contenteditable></td>
<td><button onclick="map(this)">Map</button></td>
<td><button onclick="del(this)">X</button></td>
</tr>

</table>

<button class="add" onclick="addRow('table2')">+ Add</button>

</div>

<script>

function addRow(id){

let table=document.getElementById(id);

let row=table.insertRow(-1);

row.innerHTML=
`
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td><button onclick="map(this)">Map</button></td>
<td><button onclick="del(this)">X</button></td>
`;

save()

}

function del(btn){

btn.parentNode.parentNode.remove();

save()

}

function map(btn){

let place=btn.parentNode.parentNode.children[1].innerText;

window.open(
"https://www.google.com/maps/search/"+place
)

}

document.addEventListener("input",save)

function save(){

localStorage.setItem(
"tripdata",
document.body.innerHTML
)

}

window.onload=function(){

let data=localStorage.getItem("tripdata")

if(data){

document.body.innerHTML=data

}

}

</script>

</body>
</html>

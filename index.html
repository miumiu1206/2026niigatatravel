const dates=Object.keys(data)

let today=new Date().toISOString().slice(0,10)

dates.forEach((d,i)=>{

let date=new Date(d)

let label=week[date.getDay()]+" • "+d+" • Day "+(i+1)

if(d==today){
label="⭐ Today • "+label
}

let op=document.createElement("option")

op.value=d
op.text=label

select.appendChild(op)

})

if(data[today]){
select.value=today
}

select.onchange=loadDay

function loadDay(){

let day=select.value

let d=data[day]

document.getElementById("location").innerText=d.location||""

document.getElementById("hotel").innerText=d.hotel||""

document.getElementById("restaurant").innerText=d.restaurant||""

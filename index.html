<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🌸 Japan Trip 2026</title>

<style>

body{
margin:0;
font-family:-apple-system;
background:#ffd6e7;
color:#333;
}

header{
text-align:center;
padding:20px;
background:#ffc3d9;
font-size:20px;
font-weight:bold;
}

.container{
padding:15px;
}

select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-bottom:15px;
font-size:16px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.title{
font-weight:bold;
margin-bottom:8px;
}

button{
background:#ff7aa8;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
font-size:14px;
}

.map{
margin-top:8px;
display:inline-block;
}

.dayinfo{
font-size:14px;
margin-bottom:10px;
text-align:center;
}

</style>
</head>

<body>

<header>
🌸 Japan Trip 2026
</header>

<div class="container">

<div class="dayinfo" id="dayInfo"></div>

<select id="daySelect"></select>

<div class="card">
<div class="title">📍 Location</div>
<div id="location"></div>
<a id="mapBtn" target="_blank">
<button class="map">🗺 Map</button>
</a>
</div>

<div class="card">
<div class="title">🏨 Hotel</div>
<div id="hotel"></div>
</div>

<div class="card">
<div class="title">🍽 Restaurant</div>
<div id="weather"></div>
</div>

<div class="card">
<div class="title">📝 Remark</div>
<div id="remark"></div>
</div>

</div>

<script>

const data={

"2026-03-07":{
location:"東京(品川)",
hotel:"品川高輪王子酒店",
remark:"抵達東京"
},

"2026-03-08":{
location:"東京",
hotel:"品川高輪王子酒店"
},

"2026-03-09":{
location:"東京",
hotel:"品川高輪王子酒店"
},

"2026-03-10":{
location:"東京",
hotel:"品川高輪王子酒店"
},

"2026-03-11":{
location:"新潟",
hotel:"APA （新潟站前大通）"
},

"2026-03-12":{
location:"新潟",
hotel:"APA （新潟站前大通）"
},

"2026-03-13":{
location:"輕井澤",
hotel:"APA （新潟站前大通）"
},

"2026-03-14":{
location:"輕井澤",
hotel:"APA （新潟站前大通）"
},

"2026-03-15":{
location:"月岡溫泉",
hotel:"新潟 白玉之湯 華鳳"
},

"2026-03-16":{
location:"月岡溫泉",
hotel:"新潟 白玉之湯 華鳳"
},

"2026-03-17":{
location:"月岡溫泉",
hotel:"新潟 白玉之湯 華鳳"
},

"2026-03-18":{
location:"新潟",
hotel:"新潟大倉酒店"
},

"2026-03-19":{
location:"新潟",
hotel:"新潟大倉酒店"
},

"2026-03-20":{
location:"新潟",
hotel:"新潟大倉酒店"
},

"2026-03-21":{
location:"新潟",
hotel:"新潟大倉酒店"
},

"2026-03-22":{
location:"東京",
hotel:"神田: 相鐵FRESA INN 神田大手町"
},

"2026-03-23":{
location:"東京",
hotel:"神田: 相鐵FRESA INN 神田大手町"
},

"2026-03-24":{
location:"東京",
hotel:"回程"
}

}

const select=document.getElementById("daySelect")

const startDate=new Date(Object.keys(data)[0])
const today=new Date().toISOString().slice(0,10)

const weekday=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]

Object.keys(data).forEach((d,i)=>{

let dateObj=new Date(d)
let w=weekday[dateObj.getDay()]

let op=document.createElement("option")
op.value=d

let label=d+" ("+w+")"

if(d===today){
label+=" ⭐ Today"
}

op.text=label

select.appendChild(op)

})

if(data[today]){
select.value=today
}else{
select.value=Object.keys(data)[0]
}

select.onchange=loadDay

function loadDay(){

let day=select.value
let d=data[day]

document.getElementById("location").innerText=d.location||""
document.getElementById("hotel").innerText=d.hotel||""
document.getElementById("remark").innerText=d.remark||""

document.getElementById("mapBtn").href=
"https://www.google.com/maps/search/"+d.location

let diff=(new Date(day)-startDate)/(1000*60*60*24)+1

let dateObj=new Date(day)
let w=weekday[dateObj.getDay()]

document.getElementById("dayInfo").innerText=
day+" ("+w+") • Day "+diff

restaurant()

}

function restaurant(){

document.getElementById("weather").innerText=
"叙叙苑 (品川王子酒店)"

}

loadDay()

</script>

</body>
</html>
